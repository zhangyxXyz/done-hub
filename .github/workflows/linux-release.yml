name: Linux Release
permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      nextchat_version:
        description: "ChatGPTNextWeb/NextChat tag"
        required: false
        default: "v2.16.1"
      mjchat_version:
        description: "Dooy/chatgpt-web-midjourney-proxy tag"
        required: false
        default: "v2.26.5"
  push:
    tags:
      - "*"
      - "!*-alpha*"
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22.20.0
      - name: Build Frontend
        env:
          CI: ""
        run: |
          cd web
          yarn config set registry https://registry.npmjs.org
          yarn install --frozen-lockfile --network-timeout 600000
          VITE_APP_VERSION=$(git describe --tags) yarn run build
          cd ..
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.5"
          cache: false
      - name: Cache Go
        uses: actions/cache@v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: v2-${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            v2-${{ runner.os }}-go-
      - name: Build Backend (amd64)
        run: |
          go mod download
          go build -ldflags "-s -w -X 'done-hub/common/config.Version=$(git describe --tags)' -extldflags '-static'" -o done-hub

      - name: Build Backend (arm64)
        run: |
          sudo rm /etc/apt/sources.list.d/microsoft-prod.list
          sudo apt-get update
          sudo apt-get install gcc-aarch64-linux-gnu
          CC=aarch64-linux-gnu-gcc CGO_ENABLED=1 GOOS=linux GOARCH=arm64 go build -ldflags "-s -w -X 'done-hub/common/config.Version=$(git describe --tags)' -extldflags '-static'" -o done-hub-arm64
      - name: Cache NextChat build
        uses: actions/cache@v5
        with:
          path: release-build/nextchat
          key: v2-${{ runner.os }}-nextchat-${{ github.event.inputs.nextchat_version || 'v2.16.1' }}-${{ hashFiles('scripts/build-nextchat.mjs') }}
      - name: Cache Midjourney chat build
        uses: actions/cache@v5
        with:
          path: release-build/mjchat
          key: v2-${{ runner.os }}-mjchat-${{ github.event.inputs.mjchat_version || 'v2.26.5' }}-${{ hashFiles('scripts/build-midjourney-proxy.mjs') }}
      - name: Build bundled chat services
        env:
          NEXTCHAT_VERSION: ${{ github.event.inputs.nextchat_version || 'v2.16.1' }}
          MJCHAT_VERSION: ${{ github.event.inputs.mjchat_version || 'v2.26.5' }}
          NEXTCHAT_KEEP_WORKTREE: "true"
          MJCHAT_KEEP_WORKTREE: "true"
        run: |
          mkdir -p release/done-hub-linux-amd64 release/done-hub-linux-arm64
          cp done-hub release/done-hub-linux-amd64/
          cp done-hub-arm64 release/done-hub-linux-arm64/
          chmod +x release/done-hub-linux-amd64/done-hub release/done-hub-linux-arm64/done-hub-arm64
          export NEXTCHAT_WORKTREE="$(node -e "process.stdout.write(require('path').resolve('release-build/nextchat'))")"
          export MJCHAT_WORKTREE="$(node -e "process.stdout.write(require('path').resolve('release-build/mjchat'))")"
          node scripts/build-nextchat.mjs --mode standalone
          node scripts/build-midjourney-proxy.mjs
          node scripts/package-chat-services.mjs --output release/done-hub-linux-amd64
          node scripts/package-chat-services.mjs --output release/done-hub-linux-arm64
          export NEXTCHAT_WORKTREE="$(node -e "process.stdout.write(require('path').resolve('release/done-hub-linux-amd64/nextchat'))")"
          export MJCHAT_WORKTREE="$(node -e "process.stdout.write(require('path').resolve('release/done-hub-linux-amd64/mjchat'))")"
          node scripts/check-chat-services.mjs
          tar -czf done-hub-linux-amd64.tar.gz -C release done-hub-linux-amd64
          tar -czf done-hub-linux-arm64.tar.gz -C release done-hub-linux-arm64
      - name: Upload manual artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v7
        with:
          name: done-hub-linux
          path: |
            done-hub-linux-amd64.tar.gz
            done-hub-linux-arm64.tar.gz

      - name: Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            done-hub-linux-amd64.tar.gz
            done-hub-linux-arm64.tar.gz
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
