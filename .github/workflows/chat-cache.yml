name: Chat Build Cache

on:
  workflow_dispatch:
    inputs:
      nextchat_version:
        description: "ChatGPTNextWeb/NextChat tag"
        required: false
        default: "v2.16.1"
      mjchat_version:
        description: "Dooy/chatgpt-web-midjourney-proxy tag"
        required: false
        default: "v2.26.5"
  push:
    branches:
      - dev
    paths:
      - ".github/workflows/chat-cache.yml"
      - "Dockerfile-action"
      - "scripts/build-nextchat.mjs"
      - "scripts/build-midjourney-proxy.mjs"

jobs:
  warm-chat-cache:
    name: Warm chat cache (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.20.0

      - name: Cache NextChat build
        uses: actions/cache@v5
        with:
          path: release-build/nextchat
          key: v2-${{ runner.os }}-nextchat-${{ github.event.inputs.nextchat_version || 'v2.16.1' }}-${{ hashFiles('scripts/build-nextchat.mjs') }}

      - name: Cache Midjourney chat build
        uses: actions/cache@v5
        with:
          path: release-build/mjchat
          key: v2-${{ runner.os }}-mjchat-${{ github.event.inputs.mjchat_version || 'v2.26.5' }}-${{ hashFiles('scripts/build-midjourney-proxy.mjs') }}

      - name: Build cached chat services
        env:
          NEXTCHAT_VERSION: ${{ github.event.inputs.nextchat_version || 'v2.16.1' }}
          MJCHAT_VERSION: ${{ github.event.inputs.mjchat_version || 'v2.26.5' }}
          NEXTCHAT_KEEP_WORKTREE: "true"
          MJCHAT_KEEP_WORKTREE: "true"
        run: |
          mkdir -p release-build
          export NEXTCHAT_WORKTREE="$(node -e "process.stdout.write(require('path').resolve('release-build/nextchat'))")"
          export MJCHAT_WORKTREE="$(node -e "process.stdout.write(require('path').resolve('release-build/mjchat'))")"
          node scripts/build-nextchat.mjs --mode standalone
          node scripts/build-midjourney-proxy.mjs

  warm-docker-chat-layers:
    name: Warm Docker chat layers (${{ matrix.platform }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            arch: amd64
            cache-scope: done-hub-docker-amd64
          - platform: linux/arm64
            arch: arm64
            cache-scope: done-hub-docker-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare placeholder binaries
        run: |
          printf '#!/bin/sh\nexit 0\n' > done-hub-amd64
          printf '#!/bin/sh\nexit 0\n' > done-hub-arm64
          chmod +x done-hub-amd64 done-hub-arm64

      - name: Set up QEMU
        if: matrix.arch == 'arm64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Warm Docker chat layers
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            COMMIT_SHA=${{ github.sha }}
            NEXTCHAT_VERSION=${{ github.event.inputs.nextchat_version || 'v2.16.1' }}
            MJCHAT_VERSION=${{ github.event.inputs.mjchat_version || 'v2.26.5' }}
          outputs: type=cacheonly
          cache-from: type=gha,scope=${{ matrix.cache-scope }}
          cache-to: type=gha,mode=max,scope=${{ matrix.cache-scope }}
          file: Dockerfile-action
